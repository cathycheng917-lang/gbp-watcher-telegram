# 触发阈值：数字越小表示越“便宜”（更接近你想换汇的点）
thresholds:
  watch: 9999
  target: 9998
  lower_1: 9997
  strong: 9996

# 运行时间窗口（北京时间）
run_window:
  tz: Asia/Shanghai
  start: "07:00"
  end: "23:00"

# 数据源：默认抓取中国银行「外汇牌价」页面
source:
  url: "https://www.boc.cn/sourcedb/whpj/"
  currency_keywords: ["英镑", "GBP"]
  field_keywords: ["现汇卖出价", "Selling Rate"]

